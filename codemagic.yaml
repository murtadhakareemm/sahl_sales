# Codemagic CI/CD configuration for Sahl Sales
# For details, see: https://docs.codemagic.io/yaml-schema/yaml-schema/

workflows:
  sahl-sales-build:
    name: Sahl Sales Production Build (Android & iOS Unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        BUNDLE_ID: "com.sahlsales.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true

    scripts:
      - name: Install dependencies and select Flutter version
        script: |
          flutter channel stable
          flutter upgrade
          flutter doctor
          flutter pub get

      - name: Build Android APK (Release)
        script: |
          flutter clean
          flutter build apk --release

      - name: Build iOS App and Package as IPA
        script: |
          # 1. Build the raw iOS app bundle without code signing
          flutter build ios --release --no-codesign
          
          # 2. Package it manually into a standard .ipa file for Sideloadly
          # An .ipa file is just a ZIP archive containing a folder named "Payload" with the ".app" bundle inside
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r sahl_sales_unsigned.ipa Payload

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/ios/iphoneos/sahl_sales_unsigned.ipa

    publishing:
      email:
        recipients:
          # Change this to your email to receive built packages automatically
          - admin@sahl-sales.com
        notify:
          success: true
          failure: true
