# Codemagic CI/CD configuration for Sahl Sales
# For details, see: https://docs.codemagic.io/yaml-schema/yaml-schema/

workflows:
  sahl-sales-build:
    name: Sahl Sales Production Build (Android & iOS Unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        BUNDLE_ID: "com.sahlsales.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true

    scripts:
      - name: Install dependencies and select Flutter version
        script: |
          flutter channel stable
          flutter upgrade
          flutter doctor
          flutter pub get

      - name: Build Android APK (Release)
        script: |
          flutter build apk --release --clean

      - name: Build iOS IPA (Unsigned for Sideloading)
        script: |
          # Use official Flutter command to build an unsigned ipa directly
          flutter build ipa --release --no-codesign --clean

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          # Change this to your email to receive built packages automatically
          - admin@sahl-sales.com
        notify:
          success: true
          failure: true
