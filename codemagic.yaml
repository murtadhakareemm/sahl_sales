# Codemagic CI/CD configuration for Sahl Sales
# For details, see: https://docs.codemagic.io/yaml-schema/yaml-schema/

workflows:
  sahl-sales-build:
    name: Sahl Sales Production Build (Android & iOS)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        # Define environment variables groups in Codemagic UI:
        # - apple_credentials (contains: APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_PRIVATE_KEY)
        - apple_credentials
      vars:
        BUNDLE_ID: "com.sahlsales.app" # Replace with your iOS Bundle Identifier
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true

    scripts:
      - name: Install dependencies and select Flutter version
        script: |
          flutter channel stable
          flutter upgrade
          flutter doctor
          flutter pub get

      - name: Setup Apple Certificates & Profiles (Automatic Code Signing)
        script: |
          # Initialize keychain and fetch certificates automatically from Apple Developer portal
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --project-id "$XCODE_SCHEME" --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build Android APK (Release)
        script: |
          flutter build apk --release --clean

      - name: Build iOS IPA (Release)
        script: |
          # Build and sign the iOS IPA package
          flutter build ipa --release --export-method ad-hoc --clean

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          # Change this to your email to receive built packages automatically
          - admin@sahl-sales.com
        notify:
          success: true
          failure: true
